version: "3.9"

services:
  # ─── Data Layer ──────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: rgp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rgp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rgp}
      POSTGRES_DB: ${POSTGRES_DB:-rgp}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rgp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rgp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── Indexer ─────────────────────────────────────────────────────────────────

  indexer:
    build:
      context: ./indexer
      dockerfile: Dockerfile
    container_name: rgp-indexer
    restart: unless-stopped
    environment:
      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      DATABASE_URL: postgresql://${POSTGRES_USER:-rgp}:${POSTGRES_PASSWORD:-rgp}@postgres:5432/${POSTGRES_DB:-rgp}
      REDIS_URL: redis://redis:6379
      IDENTITY_PROGRAM_ID: ${IDENTITY_PROGRAM_ID:-}
      SBT_PROGRAM_ID: ${SBT_PROGRAM_ID:-}
      ATTESTATION_PROGRAM_ID: ${ATTESTATION_PROGRAM_ID:-}
      RGP_PROGRAM_ID: ${RGP_PROGRAM_ID:-}
      START_SLOT: ${START_SLOT:-0}
      COMMITMENT: ${COMMITMENT:-confirmed}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Graph Engine ─────────────────────────────────────────────────────────────

  graph-engine:
    build:
      context: ./graph-engine
      dockerfile: Dockerfile
    container_name: rgp-graph-engine
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      LISTEN_ADDR: 0.0.0.0:8081
      DATABASE_URL: postgresql://${POSTGRES_USER:-rgp}:${POSTGRES_PASSWORD:-rgp}@postgres:5432/${POSTGRES_DB:-rgp}
      REDIS_URL: redis://redis:6379
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Backend API ──────────────────────────────────────────────────────────────

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: rgp-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-rgp}:${POSTGRES_PASSWORD:-rgp}@postgres:5432/${POSTGRES_DB:-rgp}
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3001}
      GRAPH_ENGINE_URL: http://graph-engine:8081
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Frontend ─────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
        VITE_SOLANA_RPC_URL: ${VITE_SOLANA_RPC_URL:-https://api.devnet.solana.com}
        VITE_SOLANA_CLUSTER: ${VITE_SOLANA_CLUSTER:-devnet}
        VITE_IDENTITY_PROGRAM_ID: ${IDENTITY_PROGRAM_ID:-}
        VITE_SBT_PROGRAM_ID: ${SBT_PROGRAM_ID:-}
        VITE_ATTESTATION_PROGRAM_ID: ${ATTESTATION_PROGRAM_ID:-}
        VITE_RGP_PROGRAM_ID: ${RGP_PROGRAM_ID:-}
    container_name: rgp-frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - api

  # ─── Monitoring ───────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: rgp-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus

  grafana:
    image: grafana/grafana:11.3.0
    container_name: rgp-grafana
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?GRAFANA_PASSWORD is required}
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafanadata:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

  redis-exporter:
    image: oliver006/redis_exporter:v1.67.0
    container_name: rgp-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis:6379
    depends_on:
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  prometheusdata:
  grafanadata:
