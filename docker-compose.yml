version: "3.9"

services:
  # ─── Data Layer ──────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: rgp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rgp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rgp}
      POSTGRES_DB: ${POSTGRES_DB:-rgp}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rgp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rgp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── Indexer ─────────────────────────────────────────────────────────────────

  indexer:
    build:
      context: ./indexer
      dockerfile: Dockerfile
    container_name: rgp-indexer
    restart: unless-stopped
    environment:
      RPC_URL: ${RPC_URL:-http://host.docker.internal:8545}
      DATABASE_URL: postgresql://${POSTGRES_USER:-rgp}:${POSTGRES_PASSWORD:-rgp}@postgres:5432/${POSTGRES_DB:-rgp}
      REDIS_URL: redis://redis:6379
      IDENTITY_CONTRACT: ${IDENTITY_CONTRACT:-}
      SBT_CONTRACT: ${SBT_CONTRACT:-}
      ATTESTATION_CONTRACT: ${ATTESTATION_CONTRACT:-}
      ANCHOR_CONTRACT: ${ANCHOR_CONTRACT:-}
      START_BLOCK: ${START_BLOCK:-0}
      CONFIRMATION_BLOCKS: ${CONFIRMATION_BLOCKS:-2}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Graph Engine ─────────────────────────────────────────────────────────────

  graph-engine:
    build:
      context: ./graph-engine
      dockerfile: Dockerfile
    container_name: rgp-graph-engine
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      LISTEN_ADDR: 0.0.0.0:8081
      DATABASE_URL: postgresql://${POSTGRES_USER:-rgp}:${POSTGRES_PASSWORD:-rgp}@postgres:5432/${POSTGRES_DB:-rgp}
      REDIS_URL: redis://redis:6379
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Backend API ──────────────────────────────────────────────────────────────

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: rgp-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-rgp}:${POSTGRES_PASSWORD:-rgp}@postgres:5432/${POSTGRES_DB:-rgp}
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      GRAPH_ENGINE_URL: http://graph-engine:8081
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Frontend ─────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
        NEXT_PUBLIC_CHAIN_ID: ${NEXT_PUBLIC_CHAIN_ID:-10143}
        NEXT_PUBLIC_IDENTITY_CONTRACT: ${IDENTITY_CONTRACT:-}
        NEXT_PUBLIC_SBT_CONTRACT: ${SBT_CONTRACT:-}
        NEXT_PUBLIC_ATTESTATION_CONTRACT: ${ATTESTATION_CONTRACT:-}
        NEXT_PUBLIC_ANCHOR_CONTRACT: ${ANCHOR_CONTRACT:-}
    container_name: rgp-frontend
    restart: unless-stopped
    ports:
      - "3001:3000"
    depends_on:
      - api

  # ─── Monitoring ───────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: rgp-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: rgp-grafana
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafanadata:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

volumes:
  pgdata:
  redisdata:
  prometheusdata:
  grafanadata:
