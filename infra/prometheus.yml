global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "rgp-api"
    static_configs:
      - targets: ["api:3000"]
    metrics_path: "/metrics"

  - job_name: "rgp-graph-engine"
    static_configs:
      - targets: ["graph-engine:8081"]
    metrics_path: "/metrics"

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
